name: Demo Video

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'demos/**'
      - 'scripts/record-demo.sh'
      - 'Makefile'
      - 'Taskfile.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/treemand/go.mod
          cache-dependency-path: cli/treemand/go.sum

      - name: Build and install treemand
        run: make install

      - name: Install demo dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          curl -fsSL https://github.com/tsl0922/ttyd/releases/latest/download/ttyd.x86_64 -o /tmp/ttyd
          sudo install /tmp/ttyd /usr/local/bin/ttyd
          go install github.com/charmbracelet/vhs@latest

      - name: Record demo video
        run: bash scripts/record-demo.sh

      - name: Upload demo video
        uses: actions/upload-artifact@v4
        with:
          name: demo-video
          path: dist/demo.mp4
          retention-days: 90
